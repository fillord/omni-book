version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: omnibook-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omni_book
    ports:
      - '5434:5432' # Внешний порт 5434, чтобы не мешать твоим старым базам
    volumes:
      # Мапим данные в папку проекта для легкого доступа и бэкапов
      - ./data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

# Мы убрали именованный volume и перешли на путь ./data
